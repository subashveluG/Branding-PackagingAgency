<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BrandEdge Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><path d='M30 30 L70 30 L70 70 L30 70 Z' fill='none' stroke='white' stroke-width='8'/><path d='M50 30 L50 70' fill='none' stroke='white' stroke-width='8'/></svg>">
    <style>
        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--secondary-color);
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background-color: var(--bg-body);
        }

        .back-to-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 1050;
            text-decoration: none;
            color: var(--primary-color);
            background: var(--bg-body);
            padding: 0.75rem 1.25rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .back-to-home:hover {
            transform: translateX(-5px);
            background: var(--primary-color);
            color: white;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg sticky-top bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-intersect me-2"></i> BrandEdge
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">BrandEdge</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link text-body" href="home1.html">Home 1</a></li>
                        <li class="nav-item"><a class="nav-link text-body" href="home2.html">Home 2</a></li>
                        <li class="nav-item"><a class="nav-link text-body" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link text-body" href="services.html">Services</a></li>
                        <li class="nav-item"><a class="nav-link text-body" href="contact.html">Contact</a></li>
                        <li class="nav-item"><a class="nav-link text-body" href="dashboard.html">Dashboard</a></li>
                    </ul>
                    <div class="d-flex align-items-center gap-2">
                        <a href="login.html" class="btn btn-outline-primary shadow-sm">Login</a>
                        <a href="signup.html" class="btn btn-primary shadow-sm">Sign Up</a>
                        <button class="btn btn-link nav-link px-2" id="themeToggle">
                            <i class="bi bi-moon-stars-fill fs-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-container py-5 position-relative">
        <a href="index.html" class="back-to-home">
            <i class="bi bi-arrow-left"></i>
            <span>Back to Home</span>
        </a>
        <div class="auth-card bg-body">
            <div class="text-center mb-4">
                <h4 class="fw-bold">Create Account</h4>
                <p class="text-muted small">Join us today and build something great</p>
            </div>

            <form>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">First Name</label>
                        <input type="text" class="form-control" placeholder="John">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms">
                    <label class="form-check-label small" for="terms">I agree to the <a href="#"
                            class="text-primary text-decoration-none hover-highlight">Terms & Conditions</a></label>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Sign Up</button>
            </form>

            <div class="text-center mb-3">
                <span class="text-muted small">Or sign up with</span>
            </div>

            <div class="d-flex justify-content-center gap-3 mb-4">
                <button class="btn btn-outline-secondary px-3"><i class="bi bi-google"></i></button>
                <button class="btn btn-outline-secondary px-3"><i class="bi bi-facebook"></i></button>
                <button class="btn btn-outline-secondary px-3"><i class="bi bi-apple"></i></button>
            </div>

            <div class="text-center">
                <p class="small mb-0">Already have an account? <a href="login.html"
                        class="text-primary fw-bold text-decoration-none hover-highlight">Login</a></p>
            </div>
        </div>
    </div>


    <button id="backToTop" title="Go to top">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
